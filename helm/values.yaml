replicaCount: 1

image:
  repository: alphaxad9/booking_microservice_frontend
  pullPolicy: IfNotPresent
  tag: "0.0.1"
  # For private DockerHub repos
  # imagePullSecrets:
  #   - name: regcred

nameOverride: ""
fullnameOverride: ""

# Frontend doesn't need service account (no Kubernetes API access)
serviceAccount:
  create: false
  automount: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  ingressClassName: traefik  # ✅ FIX: Use ingressClassName instead of deprecated annotation
  annotations: {}
  hosts:
    - host: app.zedvye.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  # For HTTPS (add when ready)
  # tls:
  #   - secretName: frontend-tls
  #     hosts:
  #       - app.zedvye.com

# ✅ FIX: Increased memory for React + nginx
resources:
  requests:
    memory: "128Mi"
    cpu: "50m"
  limits:
    memory: "256Mi"
    cpu: "100m"

nodeSelector: {}
tolerations: {}
affinity: {}

# No env needed - values are baked into the image at build time
# ⚠️ CRITICAL: Ensure image was built with Kubernetes service URLs:
#   REACT_APP_BOOKING_SERVICE_URL=http://booking-service:8000/booking_service/booking/
#   REACT_APP_ROOM_SERVICE_URL=http://room-service:8000/room_service/
#   REACT_APP_POSTS_SERVICE_URL=http://post-service:8080/api/v1/

httpRoute:
  enabled: false
  parentRefs: []
  hostnames: []
  rules: []
