# ============================================
# FRONTEND HELM CHART - COMPLETE VALUES
# ============================================

# Namespace configuration
namespace: frontend

# Service configuration
service:
  name: frontend
  port: 80

# ConfigMap name (used by all deployments)
configMap:
  name: frontend-config

# ============================================
# DEPLOYMENTS CONFIGURATION
# ============================================
deployments:
  api:
    replicas: 1
    resources:
      requests:
        memory: "128Mi"
        cpu: "50m"
      limits:
        memory: "256Mi"
        cpu: "100m"

# ============================================
# BACKEND CONFIGURATION
# ============================================
backend:
  frontend:
    image:
      repository: alphaxad9/booking_microservice_frontend
      tag: "0.0.4"
      pullPolicy: IfNotPresent
    port: 80

# ============================================
# CONFIGURATION VALUES (for ConfigMap)
# ============================================
config:
  frontend:
    nodeEnv: "development"

# ============================================
# INGRESS CONFIGURATION
# ============================================
ingress:
  enabled: true

# ============================================
# SERVICE ACCOUNT CONFIGURATION
# ============================================
serviceAccount:
  create: true
  name: frontend-sa
  automount: true
  annotations: {}

# ============================================
# MISC CONFIGURATION
# ============================================
replicaCount: 1

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

# Autoscaling
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

# Node configuration
nodeSelector: {}
tolerations: []
affinity: {}