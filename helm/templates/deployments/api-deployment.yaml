apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: frontend
    component: web
    managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.deployments.api.replicas }}
  selector:
    matchLabels:
      app: frontend
      component: web
  template:
    metadata:
      labels:
        app: frontend
        component: web
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "80"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
      - name: frontend
        image: {{ .Values.backend.frontend.image.repository }}:{{ .Values.backend.frontend.image.tag }}
        imagePullPolicy: {{ .Values.backend.frontend.image.pullPolicy }}
        ports:
        - containerPort: 80
          name: http
        envFrom:
        - configMapRef:
            name: {{ .Values.configMap.name }}
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        resources:
          requests:
            memory: {{ .Values.deployments.api.resources.requests.memory }}
            cpu: {{ .Values.deployments.api.resources.requests.cpu }}
          limits:
            memory: {{ .Values.deployments.api.resources.limits.memory }}
            cpu: {{ .Values.deployments.api.resources.limits.cpu }}
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        startupProbe:
          httpGet:
            path: /
            port: http
          failureThreshold: 30
          periodSeconds: 10
          timeoutSeconds: 5