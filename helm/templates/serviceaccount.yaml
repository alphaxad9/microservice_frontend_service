{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "helm.appname" (dict "ctx" $ "svc" "frontend") }}
  labels:
    app: {{ include "helm.appname" (dict "ctx" $ "svc" "frontend") }}
    app.kubernetes.io/component: frontend
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
{{- end }}