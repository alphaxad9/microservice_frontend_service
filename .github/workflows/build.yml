name: Build and Push Frontend Service Image

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: frontend-service-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: frontend-service
  REGISTRY: ghcr.io

jobs:

  build-and-push:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write
      security-events: write
      actions: read

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/frontend-service
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          load: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            REACT_APP_API_BASE_URL=http://auth-service.auth-service.svc.cluster.local:8000/zedvye_one
            REACT_APP_ROOM_SERVICE_URL=http://room-service.room-service.svc.cluster.local:8000/room_service/
            REACT_APP_BOOKING_SERVICE_URL=http://booking-service.booking-service.svc.cluster.local:8000/booking_service/booking/
            REACT_APP_POSTS_SERVICE_URL=http://post-service.post-service.svc.cluster.local:8080/api/v1/

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/frontend-service:sha-${{ github.sha }}
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          github-pat: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SARIF
        if: github.event_name == 'push'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy.sarif